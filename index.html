<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nearfolk</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #f5efe6; }
    canvas { display: block; }
    #no-webgl {
      display: none;
      position: fixed; inset: 0;
      background: #f5efe6;
      color: #6b4e3a;
      font-family: 'Nunito', sans-serif;
      font-size: 1.2rem;
      display: none;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
  </style>
  <link rel="icon" type="image/png" href="/logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&family=Lora:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div id="no-webgl">
    <div>
      <h1 style="font-family: 'Lora', serif; font-size: 2rem; margin-bottom: 1rem;">Nearfolk</h1>
      <p>Nearfolk needs WebGL to run.<br>Try Chrome, Firefox, or Edge.</p>
    </div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
